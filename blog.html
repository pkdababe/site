<!DOCTYPE html> <!-- This header tells the internet 
                that we're using a html5 protocol-->
<html lang="en"> <!-- This is where all the html code goes, 
                we've also specified that were using english-->
<head>          <!-- This is the head container, 
                all the metadata for the website goes here. Eg,
                the title shows up in the browser tab -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK'S BLOG</title> <!-- The title of the website, notice the <title> </tags>  -->
</head>
<body> <!-- The body contains everything the user sees on 
    the main website.-->
    <!-- Picking colours for the headers below -->
    <style> 
        body {
            background-color: #C8A2C8;  
        }
        
        h1 { 
            color: rgb(39, 0, 71);
        }
        h2 {
            color: rgb(59, 1, 79);
        }
        h3 {
            color: rgba(0, 39, 0, 0.7);
        }
    </style>
    <h1 style="text-align: center;"> <!-- Big Title -->
        blog </h1>
        <hr>
    <h2 style="text-align: center;">  <!-- Smaller Title -->
        About </h2>



</body>
</html>
